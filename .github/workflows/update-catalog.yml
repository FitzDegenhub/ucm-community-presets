name: Update catalog.json

on:
  push:
    paths:
      - 'presets/**'

jobs:
  update-catalog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate catalog from preset files
        run: |
          python3 << 'SCRIPT'
          import json, hashlib, os, glob
          from datetime import datetime, timezone

          presets = []
          for path in sorted(glob.glob("presets/*.ucmpreset")):
              try:
                  with open(path, encoding="utf-8") as f:
                      content = f.read()
                  data = json.loads(content)

                  file_id = os.path.splitext(os.path.basename(path))[0]
                  sha = hashlib.sha256(content.encode("utf-8")).hexdigest()
                  size = len(content.encode("utf-8"))

                  name = data.get("name", file_id)
                  author = data.get("author", "")
                  desc = data.get("description", "")
                  if len(desc) > 300:
                      desc = desc[:297] + "..."
                  url = data.get("url", "")
                  tags = data.get("tags", [])
                  version = data.get("version", "")

                  presets.append({
                      "id": file_id,
                      "file": path.replace("\\", "/"),
                      "name": name,
                      "author": author,
                      "description": desc,
                      "url": url,
                      "version": version,
                      "sha256": sha,
                      "size_bytes": size,
                      "tags": tags,
                  })
              except Exception as e:
                  print(f"Skipping {path}: {e}")

          catalog = {
              "catalog_version": 1,
              "updated_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "presets": presets
          }

          with open("catalog.json", "w", encoding="utf-8") as f:
              json.dump(catalog, f, indent=2, ensure_ascii=False)
              f.write("\n")

          print(f"Catalog updated: {len(presets)} presets")
          SCRIPT

      - name: Commit updated catalog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog.json
          if git diff --cached --quiet; then
            echo "No changes to catalog"
          else
            git commit -m "Auto-update catalog.json [skip ci]"
            git push
          fi
